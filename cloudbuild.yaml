steps:
  # Step 1 — Build the container image (reproduces the existing Dockerfile-mode build)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pattaya-rent-a-car-rebuild:$COMMIT_SHA'
      - '.'

  # Step 2 — Push the image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pattaya-rent-a-car-rebuild:$COMMIT_SHA'

  # Step 3 — Deploy to Cloud Run (verified config-preserving: image-only, inherits env/port/scaling)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pattaya-rent-a-car-rebuild'
      - '--image=gcr.io/$PROJECT_ID/pattaya-rent-a-car-rebuild:$COMMIT_SHA'
      - '--region=us-west1'
      - '--ingress=all'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/pattaya-rent-a-car-rebuild:$COMMIT_SHA'
